name: Memory Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  bench:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Init submodules
        run: git submodule update --init packages/@mikrojs/quickjs/deps/quickjs packages/@mikrojs/native/deps/nanocbor

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build memory benchmark
        run: |
          cmake -B packages/@mikrojs/native/build packages/@mikrojs/native -DBUILD_TESTING=ON
          cmake --build packages/@mikrojs/native/build --target memory_bench

      - name: Run memory benchmark
        run: packages/@mikrojs/native/build/memory_bench > bench-results.json

      - name: Strip memory_bench binary
        run: strip packages/@mikrojs/native/build/memory_bench

      - name: Append binary-size metrics
        run: pnpm --filter @repo/bench-site exec tsx src/size-report.ts --results ../bench-results.json

      - name: Check for regression vs. baseline
        if: github.event_name == 'pull_request'
        run: pnpm --filter @repo/bench-site exec tsx src/check-regression.ts --results ../bench-results.json --threshold 1.10

      - name: Build bench site
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm --filter @repo/bench-site build

      - name: Checkout bench-data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: bench-data
          path: bench-data

      - name: Append run to data.js
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # User-controlled fields (commit message, author name/email) are routed
        # through env, not interpolated into the shell, to prevent context
        # injection via a crafted commit message (e.g. a message containing "`").
        env:
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
          AUTHOR_EMAIL: ${{ github.event.head_commit.author.email }}
        run: |
          mkdir -p bench-data/dev/bench
          pnpm --filter @repo/bench-site exec tsx src/update.ts \
            --results ../bench-results.json \
            --out ../bench-data/dev/bench/data.js \
            --repo-url "https://github.com/$REPO" \
            --commit-sha "$COMMIT_SHA" \
            --commit-message "$COMMIT_MESSAGE" \
            --commit-url "https://github.com/$REPO/commit/$COMMIT_SHA" \
            --author-name "$AUTHOR_NAME" \
            --author-email "$AUTHOR_EMAIL"

      - name: Commit and push to bench-data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: bench-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dev/bench/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "bench: ${{ github.sha }}"
            git push
          fi

      - name: Stage data.js into bench-site/dist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cp -f bench-data/dev/bench/data.js bench-site/dist/data.js

      - name: Deploy bench site to Cloudflare
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # ratchet:cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: bench-site
          command: deploy
