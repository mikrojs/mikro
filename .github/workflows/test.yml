name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Init submodules
        run: git submodule update --init packages/@mikrojs/quickjs/deps/quickjs packages/@mikrojs/native/deps/nanocbor

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:ts
      - run: pnpm build:native
      - run: pnpm test:js -- --coverage --coverage.reporter=json-summary --coverage.reporter=text
      - run: pnpm test:sim

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => m.pct + '%';
              const lines = [
                '## Test Coverage',
                '',
                '| Metric | Coverage |',
                '|--------|----------|',
                '| Statements | ' + fmt(c.statements) + ' |',
                '| Branches | ' + fmt(c.branches) + ' |',
                '| Functions | ' + fmt(c.functions) + ' |',
                '| Lines | ' + fmt(c.lines) + ' |',
              ];
              console.log(lines.join('\n'));
            " >> "$GITHUB_STEP_SUMMARY"
          fi
