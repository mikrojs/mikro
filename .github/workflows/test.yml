name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Init submodules
        run: git submodule update --init packages/@mikrojs/quickjs/deps/quickjs packages/@mikrojs/native/deps/nanocbor

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:ts
      - run: pnpm build:native
      - run: pnpm test:js -- --coverage --coverage.reporter=json-summary --coverage.reporter=text
      - run: pnpm test:sim

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const fmt = (m) => m.pct + '%';
              const lines = [
                '## Test Coverage',
                '',
                '| Metric | Coverage |',
                '|--------|----------|',
                '| Statements | ' + fmt(c.statements) + ' |',
                '| Branches | ' + fmt(c.branches) + ' |',
                '| Functions | ' + fmt(c.functions) + ' |',
                '| Lines | ' + fmt(c.lines) + ' |',
              ];
              console.log(lines.join('\n'));
            " >> "$GITHUB_STEP_SUMMARY"
          fi
