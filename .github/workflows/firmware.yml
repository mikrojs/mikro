name: Build Firmware

on:
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch:
    inputs:
      target:
        description: 'ESP32 target (leave empty to build all)'
        type: choice
        default: 'all'
        options:
          - all
          - esp32
          - esp32c3
          - esp32c6
          - esp32s3

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Tagged releases are handled by release.yml, which calls the same reusable
# firmware-build workflow and bundles the binaries into the published
# @mikrojs/firmware npm package. This workflow only produces artifacts for
# ad-hoc / PR / dispatch builds, consumed via
# `mikro flash --from=mikrojs/mikrojs@<sha>`.

permissions:
  contents: read

jobs:
  setup:
    if: >-
      github.event_name != 'pull_request'
      || contains(github.event.pull_request.labels.*.name, 'firmware')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      chips: ${{ steps.read.outputs.chips }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - id: read
        env:
          TARGET: ${{ inputs.target }}
        run: |
          if [ -n "$TARGET" ] && [ "$TARGET" != "all" ]; then
            echo "chips=[\"$TARGET\"]" >> "$GITHUB_OUTPUT"
          else
            echo "chips=$(jq -c .chips packages/@mikrojs/firmware/chips.json)" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.setup.outputs.chips) }}
    uses: ./.github/workflows/firmware-build.yml
    with:
      target: ${{ matrix.target }}
      pack-format: tarball
      artifact-name: mikrojs-firmware-${{ matrix.target }}
