name: Build Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch:
    inputs:
      target:
        description: 'ESP32 target (leave empty to build all)'
        type: choice
        options:
          - all
          - esp32
          - esp32c3
          - esp32c6
          - esp32s3
      release_tag:
        description: 'Attach to this release tag (e.g. v0.1.0). Leave empty to upload as artifact only.'
        type: string

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  build:
    if: >-
      github.event_name != 'pull_request'
      || contains(github.event.pull_request.labels.*.name, 'firmware')
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0
    strategy:
      matrix:
        # Generic firmware per chip (no board-specific drivers)
        include:
          - target: esp32
            board: generic
            asset: mikrojs-firmware-esp32
          - target: esp32c3
            board: generic
            asset: mikrojs-firmware-esp32c3
          - target: esp32c6
            board: generic
            asset: mikrojs-firmware-esp32c6
          - target: esp32s3
            board: generic
            asset: mikrojs-firmware-esp32s3
          # Board-specific firmware (includes board drivers + sdkconfig)
          - target: esp32s3
            board: esp32-s3-knob-touch-lcd-1.8
            asset: mikrojs-firmware-esp32-s3-knob-touch-lcd-1.8
    env:
      TARGET: ${{ matrix.target }}
      MIKROJS_BOARD: ${{ matrix.board }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Init required submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init packages/@mikrojs/quickjs/deps/quickjs packages/@mikrojs/native/deps/nanocbor

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.asset }}-${{ github.sha }}
          restore-keys: ccache-${{ matrix.asset }}-

      - name: Set up ccache
        run: |
          which ccache || apt-get update && apt-get install -y ccache
          ccache --zero-stats
          ccache --set-config=max_size=500M
          ccache --set-config=cache_dir=$HOME/.cache/ccache

      - name: Build firmware
        working-directory: esp32
        env:
          IDF_CCACHE_ENABLE: '1'
        run: |
          . $IDF_PATH/export.sh
          rm -f sdkconfig
          idf.py set-target $TARGET
          idf.py build
          ccache --show-stats

      - name: Firmware stats
        working-directory: esp32
        run: |
          . $IDF_PATH/export.sh
          idf.py size

      - name: Package firmware archive
        working-directory: esp32/build
        run: |
          tar czf ${{ matrix.asset }}.tar.gz \
            flasher_args.json \
            bootloader/bootloader.bin \
            partition_table/partition-table.bin \
            mikrojs.bin

      - name: Upload artifact
        if: "!inputs.release_tag && !startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: esp32/build/${{ matrix.asset }}.tar.gz

      - name: Install gh CLI
        if: inputs.release_tag || startsWith(github.ref, 'refs/tags/v')
        run: |
          apt-get update && apt-get install -y gh

      - name: Attach to release
        if: inputs.release_tag || startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          gh release view $TAG || gh release create $TAG --title "$TAG" --draft
          gh release upload $TAG esp32/build/${{ matrix.asset }}.tar.gz --clobber
