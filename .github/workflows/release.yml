name: Release

on:
  # `synchronize` is intentionally NOT included: pr-preview is one-shot. Each
  # preview is opted in by adding the `release:preview` label, then the label
  # is removed after publish so subsequent pushes don't re-publish.
  pull_request:
    types: [closed, labeled]
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options: [next, release, canary]
        default: next
      dry_run:
        type: boolean
        default: true

# Concurrency:
#   - PR previews: serialize per PR (avoid out-of-order publishes from rapid pushes).
#   - Latest releases / dispatches: serialize per mode.
concurrency:
  group: release-${{ github.event.pull_request.number || github.event.inputs.mode || 'manual' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
      should_run: ${{ steps.plan.outputs.should_run }}
      npm_tag: ${{ steps.plan.outputs.npm_tag }}
      pr: ${{ steps.plan.outputs.pr }}
    steps:
      # Shallow checkout: `releaser plan --context release` only reads the
      # GitHub event payload (no git history). If plan ever needs git lookups,
      # add `with: fetch-depth: 0` here.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
      - id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --silent releaser plan --context release >> "$GITHUB_OUTPUT"

  build-prebuilds:
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Init submodules
        run: git submodule update --init packages/@mikrojs/quickjs/deps/quickjs packages/@mikrojs/native/deps/nanocbor

      - uses: ./.github/actions/setup-pnpm

      - name: Build native addon
        run: pnpm -C packages/@mikrojs/native build:native

      - name: Verify prebuild output
        shell: bash
        run: |
          path="packages/@mikrojs/native/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/mikrojs.napi.node"
          if [ ! -f "$path" ]; then
            echo "Expected prebuild not found at $path"
            exit 1
          fi
          ls -lh "$path"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/@mikrojs/native/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 7

  firmware-setup:
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      chips: ${{ steps.read.outputs.chips }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - id: read
        run: echo "chips=$(jq -c .chips packages/@mikrojs/firmware/chips.json)" >> "$GITHUB_OUTPUT"

  build-firmware:
    needs: [plan, firmware-setup]
    if: needs.plan.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.firmware-setup.outputs.chips) }}
    runs-on: ubuntu-latest
    container: espressif/idf:v6.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          submodules: false

      - uses: ./.github/actions/firmware-build
        with:
          target: ${{ matrix.target }}
          pack-format: unpacked
          artifact-name: firmware-${{ matrix.target }}

  publish:
    needs: [plan, build-prebuilds, build-firmware]
    if: needs.plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # for `releaser tag` (push tag in release mode)
      pull-requests: write # for `releaser comment-pr`
      id-token: write # OIDC for npm trusted publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Init submodules
        run: git submodule update --init packages/@mikrojs/quickjs/deps/quickjs

      - uses: ./.github/actions/setup-pnpm
        with:
          ignore-scripts: 'true' # no C++ toolchain on this runner; pure-TS dists only
          registry-url: https://registry.npmjs.org

      # `--use-current` is critical for `release` mode: the release PR has
      # already bumped package.json before merging. Re-running bump here would
      # double-increment (e.g. 0.2.0 → 0.3.0) and publish the wrong version.
      # Other modes always compute a fresh version from the current root.
      - name: Bump version
        id: bump
        run: |
          pnpm --silent releaser bump \
            --mode ${{ needs.plan.outputs.mode }} \
            ${{ needs.plan.outputs.mode == 'release' && '--use-current' || '' }} \
            ${{ needs.plan.outputs.pr && format('--pr {0}', needs.plan.outputs.pr) || '' }} \
            --json > /tmp/bump.json
          version=$(jq -r .version /tmp/bump.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - run: pnpm -r --if-present run build:ts

      - name: Download prebuilds
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # ratchet:actions/download-artifact@v4
        with:
          path: packages/@mikrojs/native/prebuilds/
          pattern: prebuild-*
          merge-multiple: false

      - name: Normalize prebuild layout
        run: |
          cd packages/@mikrojs/native/prebuilds
          for dir in prebuild-*; do
            if [ -d "$dir" ]; then
              mv "$dir" "${dir#prebuild-}"
            fi
          done
          find . -type f | sort

      - name: Download firmware
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # ratchet:actions/download-artifact@v4
        with:
          path: packages/@mikrojs/firmware/prebuilds/
          pattern: firmware-*
          merge-multiple: false

      - name: Normalize firmware layout
        run: |
          cd packages/@mikrojs/firmware/prebuilds
          for dir in firmware-*; do
            if [ -d "$dir" ]; then
              mv "$dir" "${dir#firmware-}"
            fi
          done
          find . -type f | sort

      - name: Verify firmware completeness
        run: |
          cd packages/@mikrojs/firmware
          missing=0
          for chip in $(jq -r '.chips[]' chips.json); do
            for f in flasher_args.json bootloader/bootloader.bin partition_table/partition-table.bin mikrojs.bin; do
              if [ ! -f "prebuilds/$chip/$f" ]; then
                echo "Missing: prebuilds/$chip/$f"
                missing=1
              fi
            done
          done
          [ "$missing" -eq 0 ]

      # `inputs.dry_run` is null on `pull_request` triggers; the GHA expression
      # `null && X || ''` evaluates to '' there, which is the desired no-flag
      # case. Don't "simplify" — the explicit truthy check is correct.
      - name: Publish
        run: |
          pnpm --silent releaser publish \
            --tag ${{ needs.plan.outputs.npm_tag }} \
            ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          # OIDC trusted publishing requires no token. Token fallback (commented out;
          # uncomment if trusted publisher isn't configured for some package):
          # NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provenance requires a public source repo; re-enable once mikrojs/mikrojs is public.
          # NPM_CONFIG_PROVENANCE: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Tag (release mode only)
        if: needs.plan.outputs.mode == 'release' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          pnpm --silent releaser tag --version ${{ steps.bump.outputs.version }}

      - name: Comment on PR (pr-preview only)
        if: needs.plan.outputs.mode == 'pr-preview' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          pnpm --silent releaser comment-pr \
            --pr ${{ needs.plan.outputs.pr }} \
            --version ${{ steps.bump.outputs.version }} \
            --tag ${{ needs.plan.outputs.npm_tag }}

      # Remove the trigger label so the next preview requires explicit re-labeling.
      # Runs even if the comment-pr step fails — the publish already happened.
      - name: Remove preview label (pr-preview only)
        if: always() && needs.plan.outputs.mode == 'pr-preview' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm --silent releaser unlabel-preview --pr ${{ needs.plan.outputs.pr }}
