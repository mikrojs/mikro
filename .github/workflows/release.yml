name: Release

on:
  # `push` (instead of `pull_request: closed`) is what makes the release-mode
  # status check appear on main's commit; pull_request runs are anchored to
  # the closed PR's head ref. The plan job filters out non-release-PR pushes.
  push:
    branches: [main]
  # `synchronize` is intentionally NOT included: pr-preview is one-shot. Each
  # preview is opted in by adding the `release:preview` label, then the label
  # is removed after publish so subsequent pushes don't re-publish.
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options: [next, release, canary]
        default: next
      dry_run:
        type: boolean
        default: true

# Concurrency:
#   - PR previews: serialize per PR (avoid out-of-order publishes from rapid pushes).
#   - Latest releases (push to main) / dispatches: serialize per mode/branch.
concurrency:
  group: release-${{ github.event.pull_request.number || github.event.inputs.mode || 'main' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read # for `releaser plan` to read PR + commit data
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
      should_run: ${{ steps.plan.outputs.should_run }}
      npm_tag: ${{ steps.plan.outputs.npm_tag }}
      pr: ${{ steps.plan.outputs.pr }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      # `releaser plan` computes the version too — it needs git history for
      # conventional-recommended-bump. fetch-depth: 0 is required.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-pnpm

      - id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --silent releaser plan --context release >> "$GITHUB_OUTPUT"

      # Mint mikrodroid App token only for pr-preview, where we need to
      # remove the trigger label as the bot. Other modes don't have
      # side effects in this job. Required mikrodroid App permissions:
      # Issues: Write (label removal goes through the issues API).
      - name: Generate mikrodroid token
        if: steps.plan.outputs.mode == 'pr-preview'
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # ratchet:actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.MIKRODROID_CLIENT_ID }}
          private-key: ${{ secrets.MIKRODROID_APP_PRIVATE_KEY }}

      # Remove the trigger label immediately so a second click during the long
      # publish (10–15 min) doesn't queue another run, and so the PR isn't
      # left in a "still labeled" state if any downstream step fails. The
      # label is a trigger, not a status — status lives in the Actions UI.
      - name: Remove preview label
        if: steps.plan.outputs.mode == 'pr-preview'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm --silent releaser unlabel-preview --pr ${{ steps.plan.outputs.pr }}

  build-prebuilds:
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: ubuntu-24.04
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Init submodules
        run: git submodule update --init packages/@mikrojs/quickjs/deps/quickjs packages/@mikrojs/native/deps/nanocbor

      - uses: ./.github/actions/setup-pnpm

      - name: Build native addon
        run: pnpm -C packages/@mikrojs/native build:native

      - name: Verify prebuild output
        shell: bash
        run: |
          path="packages/@mikrojs/native/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/mikrojs.napi.node"
          if [ ! -f "$path" ]; then
            echo "Expected prebuild not found at $path"
            exit 1
          fi
          ls -lh "$path"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/@mikrojs/native/prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/
          if-no-files-found: error
          retention-days: 7

  firmware-setup:
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    runs-on: ubuntu-24.04
    outputs:
      chips: ${{ steps.read.outputs.chips }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - id: read
        run: echo "chips=$(jq -c .chips packages/@mikrojs/firmware/chips.json)" >> "$GITHUB_OUTPUT"

  build-firmware:
    needs: [plan, firmware-setup]
    if: needs.plan.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.firmware-setup.outputs.chips) }}
    runs-on: ubuntu-24.04
    container: espressif/idf:v6.0.1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          submodules: false

      - uses: ./.github/actions/firmware-build
        with:
          target: ${{ matrix.target }}
          pack-format: unpacked
          artifact-name: firmware-${{ matrix.target }}
          # Apply the planned version so sys.version embedded in the firmware
          # matches what we publish to npm.
          version: ${{ needs.plan.outputs.version }}

  publish:
    needs: [plan, build-prebuilds, build-firmware]
    if: needs.plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # for `releaser tag` (push tag in release mode)
      pull-requests: write # for `releaser comment-pr`
      id-token: write # OIDC for npm trusted publishing
    steps:
      # Mint mikrodroid App token first so checkout uses it for the credential
      # helper. That makes `git push` of the release tag attribute to
      # mikrodroid[bot] instead of github-actions[bot]. Required mikrodroid
      # App permissions: Contents: Write (tag push + GitHub Release),
      # Issues: Write (PR-preview comments use the issues API).
      - name: Generate mikrodroid token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # ratchet:actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.MIKRODROID_CLIENT_ID }}
          private-key: ${{ secrets.MIKRODROID_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Init submodules
        run: git submodule update --init packages/@mikrojs/quickjs/deps/quickjs

      - uses: ./.github/actions/setup-pnpm
        with:
          ignore-scripts: 'true' # no C++ toolchain on this runner; pure-TS dists only
          registry-url: https://registry.npmjs.org

      # Apply the version computed by plan. Same value also written by the
      # firmware-build action — using one source of truth ensures sys.version
      # in the firmware matches the version published to npm.
      - name: Set version
        run: pnpm --silent releaser bump --mode release --set ${{ needs.plan.outputs.version }}

      - run: pnpm -r --if-present run build:ts

      - name: Download prebuilds
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          path: packages/@mikrojs/native/prebuilds/
          pattern: prebuild-*
          merge-multiple: false

      - name: Normalize prebuild layout
        run: |
          cd packages/@mikrojs/native/prebuilds
          for dir in prebuild-*; do
            if [ -d "$dir" ]; then
              mv "$dir" "${dir#prebuild-}"
            fi
          done
          find . -type f | sort

      - name: Download firmware
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8
        with:
          path: packages/@mikrojs/firmware/prebuilds/
          pattern: firmware-*
          merge-multiple: false

      - name: Normalize firmware layout
        run: |
          cd packages/@mikrojs/firmware/prebuilds
          for dir in firmware-*; do
            if [ -d "$dir" ]; then
              mv "$dir" "${dir#firmware-}"
            fi
          done
          find . -type f | sort

      - name: Verify firmware completeness
        run: |
          cd packages/@mikrojs/firmware
          missing=0
          for chip in $(jq -r '.chips[]' chips.json); do
            for f in flasher_args.json bootloader/bootloader.bin partition_table/partition-table.bin mikrojs.bin; do
              if [ ! -f "prebuilds/$chip/$f" ]; then
                echo "Missing: prebuilds/$chip/$f"
                missing=1
              fi
            done
          done
          [ "$missing" -eq 0 ]

      # `inputs.dry_run` is null on `pull_request` triggers; the GHA expression
      # `null && X || ''` evaluates to '' there, which is the desired no-flag
      # case. Don't "simplify" — the explicit truthy check is correct.
      - name: Publish
        run: |
          pnpm --silent releaser publish \
            --tag ${{ needs.plan.outputs.npm_tag }} \
            ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          # OIDC trusted publishing: no token needed. Trust relationships are
          # configured per package via `pnpm trust:setup`. Token fallback
          # (uncomment if a package's trusted publisher isn't yet configured):
          # NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Tag (release mode only)
        if: needs.plan.outputs.mode == 'release' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global user.name 'mikrodroid[bot]'
          git config --global user.email '${{ secrets.MIKRODROID_APP_ID }}+mikrodroid[bot]@users.noreply.github.com'
          pnpm --silent releaser tag --version ${{ needs.plan.outputs.version }}

      - name: Create GitHub Release (release mode only)
        if: needs.plan.outputs.mode == 'release' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          pnpm --silent releaser github-release \
            --version ${{ needs.plan.outputs.version }} \
            --latest \
            --firmware-dir packages/@mikrojs/firmware/prebuilds

      - name: Comment on PR (pr-preview only)
        if: needs.plan.outputs.mode == 'pr-preview' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          pnpm --silent releaser comment-pr \
            --pr ${{ needs.plan.outputs.pr }} \
            --version ${{ needs.plan.outputs.version }} \
            --tag ${{ needs.plan.outputs.npm_tag }}
