name: Memory Benchmark Backfill

on:
  workflow_dispatch:
    inputs:
      range:
        description: 'Git range (e.g. "main~200..main" or "abc1234..main")'
        required: true
        default: 'main~100..main'
      step:
        description: 'Sample every Nth commit'
        required: false
        default: '5'
      skip_existing:
        description: 'Skip commits already in data.js'
        type: boolean
        default: true
      dry_run:
        description: 'Do not push to bench-data (inspect the diff in job logs)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: memory-bench-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout main (for bench-site source)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6 # zizmor: ignore[cache-poisoning] workflow_dispatch-only (no PR-writable cache scope), and pnpm --frozen-lockfile verifies tarball integrity. Re-evaluate if push/pull_request/schedule triggers are added.
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Checkout bench-data
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          ref: bench-data
          path: bench-data

      - name: Run backfill
        # Route user-controlled inputs (range, step) through env rather than
        # interpolating them into the shell, for the same context-injection
        # reason as the main bench workflow.
        env:
          CCACHE_DIR: ${{ runner.temp }}/ccache
          RANGE: ${{ inputs.range }}
          STEP: ${{ inputs.step }}
          SKIP_EXISTING: ${{ inputs.skip_existing }}
          REPO: ${{ github.repository }}
          WORKDIR: ${{ runner.temp }}/bench-backfill
        run: |
          mkdir -p "$CCACHE_DIR"
          skip_flag=""
          if [ "$SKIP_EXISTING" = "true" ]; then skip_flag="--skip-existing"; fi
          mkdir -p "$GITHUB_WORKSPACE/bench-data/dev/bench"
          pnpm --filter @repo/bench-site exec tsx src/backfill.ts \
            --repo-root "$GITHUB_WORKSPACE" \
            --range "$RANGE" \
            --step "$STEP" \
            $skip_flag \
            --out "$GITHUB_WORKSPACE/bench-data/dev/bench/data.js" \
            --repo-url "https://github.com/$REPO" \
            --workdir "$WORKDIR"

      - name: Build bench site
        if: ${{ !inputs.dry_run }}
        run: pnpm --filter @repo/bench-site build

      - name: Show diff
        working-directory: bench-data
        run: |
          git status
          git diff --stat

      - name: Commit and push to bench-data
        if: ${{ !inputs.dry_run }}
        working-directory: bench-data
        env:
          RANGE: ${{ inputs.range }}
          STEP: ${{ inputs.step }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dev/bench/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "bench: backfill $RANGE (step=$STEP)"
            git push
          fi

      - name: Stage data.js into bench-site/dist
        if: ${{ !inputs.dry_run }}
        run: cp -f bench-data/dev/bench/data.js bench-site/dist/data.js

      - name: Deploy bench site to Cloudflare
        if: ${{ !inputs.dry_run }}
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # ratchet:cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: bench-site
          command: deploy
