<svg viewBox="0 0 420 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Microcontroller -->
  <rect x="20" y="50" width="120" height="160" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.5" />
  <text x="80" y="88" text-anchor="middle" fill="#333" font-size="14" font-weight="600" font-family="system-ui, sans-serif">ESP32</text>

  <!-- Pin labels -->
  <text x="135" y="123" text-anchor="end" fill="#666" font-size="11" font-family="ui-monospace, monospace">GPIO 8</text>
  <text x="135" y="163" text-anchor="end" fill="#666" font-size="11" font-family="ui-monospace, monospace">5V</text>
  <text x="135" y="203" text-anchor="end" fill="#666" font-size="11" font-family="ui-monospace, monospace">GND</text>

  <!-- Pin dots -->
  <circle cx="140" cy="120" r="3" fill="#666" />
  <circle cx="140" cy="160" r="3" fill="#e53935" />
  <circle cx="140" cy="200" r="3" fill="#666" />

  <!-- NeoPixel ring -->
  <circle cx="320" cy="120" r="70" fill="none" stroke="#666" stroke-width="1.5" />
  <circle cx="320" cy="120" r="55" fill="#f5f5f5" stroke="#666" stroke-width="1" stroke-dasharray="2 3" />
  <text x="320" y="118" text-anchor="middle" fill="#333" font-size="13" font-weight="600" font-family="system-ui, sans-serif">NeoPixel</text>
  <text x="320" y="133" text-anchor="middle" fill="#666" font-size="10" font-family="system-ui, sans-serif">24 LEDs</text>

  <!-- LED dots (rainbow) -->
  <circle cx="320.0" cy="57.5" r="4" fill="hsl(0, 90%, 60%)" />
  <circle cx="336.2" cy="59.6" r="4" fill="hsl(15, 90%, 60%)" />
  <circle cx="351.2" cy="65.9" r="4" fill="hsl(30, 90%, 60%)" />
  <circle cx="364.2" cy="75.8" r="4" fill="hsl(45, 90%, 60%)" />
  <circle cx="374.1" cy="88.8" r="4" fill="hsl(60, 90%, 60%)" />
  <circle cx="380.4" cy="103.8" r="4" fill="hsl(75, 90%, 60%)" />
  <circle cx="382.5" cy="120.0" r="4" fill="hsl(90, 90%, 60%)" />
  <circle cx="380.4" cy="136.2" r="4" fill="hsl(105, 90%, 60%)" />
  <circle cx="374.1" cy="151.2" r="4" fill="hsl(120, 90%, 60%)" />
  <circle cx="364.2" cy="164.2" r="4" fill="hsl(135, 90%, 60%)" />
  <circle cx="351.2" cy="174.1" r="4" fill="hsl(150, 90%, 60%)" />
  <circle cx="336.2" cy="180.4" r="4" fill="hsl(165, 90%, 60%)" />
  <circle cx="320.0" cy="182.5" r="4" fill="hsl(180, 90%, 60%)" />
  <circle cx="303.8" cy="180.4" r="4" fill="hsl(195, 90%, 60%)" />
  <circle cx="288.8" cy="174.1" r="4" fill="hsl(210, 90%, 60%)" />
  <circle cx="275.8" cy="164.2" r="4" fill="hsl(225, 90%, 60%)" />
  <circle cx="265.9" cy="151.3" r="4" fill="hsl(240, 90%, 60%)" />
  <circle cx="259.6" cy="136.2" r="4" fill="hsl(255, 90%, 60%)" />
  <circle cx="257.5" cy="120.0" r="4" fill="hsl(270, 90%, 60%)" />
  <circle cx="259.6" cy="103.8" r="4" fill="hsl(285, 90%, 60%)" />
  <circle cx="265.9" cy="88.8" r="4" fill="hsl(300, 90%, 60%)" />
  <circle cx="275.8" cy="75.8" r="4" fill="hsl(315, 90%, 60%)" />
  <circle cx="288.8" cy="65.9" r="4" fill="hsl(330, 90%, 60%)" />
  <circle cx="303.8" cy="59.6" r="4" fill="hsl(345, 90%, 60%)" />

  <!-- Wire: GPIO 8 → DIN (signal) -->
  <line x1="143" y1="120" x2="170" y2="120" stroke="#6366f1" stroke-width="1.5" />
  <line x1="170" y1="120" x2="170" y2="100" stroke="#6366f1" stroke-width="1.5" />
  <line x1="170" y1="100" x2="247" y2="100" stroke="#6366f1" stroke-width="1.5" />

  <!-- Wire: 5V → 5V (power) -->
  <line x1="143" y1="160" x2="195" y2="160" stroke="#e53935" stroke-width="1.5" />
  <line x1="195" y1="160" x2="195" y2="117" stroke="#e53935" stroke-width="1.5" />
  <line x1="195" y1="117" x2="247" y2="117" stroke="#e53935" stroke-width="1.5" />

  <!-- Wire: GND → GND -->
  <line x1="143" y1="200" x2="220" y2="200" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3" />
  <line x1="220" y1="200" x2="220" y2="134" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3" />
  <line x1="220" y1="134" x2="247" y2="134" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3" />

  <!-- Pad dots on ring -->
  <circle cx="250" cy="100" r="3" fill="#666" />
  <circle cx="250" cy="117" r="3" fill="#e53935" />
  <circle cx="250" cy="134" r="3" fill="#666" />

  <!-- Ring pad labels -->
  <text x="243" y="103" text-anchor="end" fill="#666" font-size="10" font-family="ui-monospace, monospace" stroke="#f5f5f5" stroke-width="4" stroke-opacity="0.8" paint-order="stroke fill">DIN</text>
  <text x="243" y="120" text-anchor="end" fill="#666" font-size="10" font-family="ui-monospace, monospace" stroke="#f5f5f5" stroke-width="4" stroke-opacity="0.8" paint-order="stroke fill">5V</text>
  <text x="243" y="137" text-anchor="end" fill="#666" font-size="10" font-family="ui-monospace, monospace" stroke="#f5f5f5" stroke-width="4" stroke-opacity="0.8" paint-order="stroke fill">GND</text>
</svg>
